<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychedelic Eye Screensaver</title>
    <style>
        body { 
            background: black; 
            margin: 0; 
            overflow: hidden; 
        }
        #eye { 
            position: absolute; 
            font-size: 150px; 
            user-select: none; 
            line-height: 1;
            filter: drop-shadow(0 0 25px #ff00ff);
        }
        #glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 255, 0.06), rgba(0, 255, 255, 0.04), rgba(255, 255, 0, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="glitch-overlay"></div>
<div id="eye">👁️</div>

<script>
  const eye = document.getElementById('eye');
  
  const eyeWidth = 150; 
  const eyeHeight = 150;
  const maxX = window.innerWidth - eyeWidth;
  const maxY = window.innerHeight - eyeHeight;

  let x = 0;
  let y = 0;

  let bounceCount = 0;
  let isFrozen = false;
  let hue = 0;

  // Perfect physics math to force a corner hit exactly on bounce #10
  let dx = (maxX * 5) / 500;
  let dy = (maxY * 4) / 500;

  function move() {
    if (isFrozen) return;

    x += dx; 
    y += dy;
    
    // Psychedelic Color Shifting Loop
    hue = (hue + 2) % 360; 
    eye.style.filter = `hue-rotate(${hue}deg) saturate(8) drop-shadow(0 0 30px hsl(${hue}, 100%, 50%))`;
    
    let hitWall = false;

    if (x >= maxX) { x = maxX; dx = -dx; hitWall = true; } 
    else if (x <= 0) { x = 0; dx = -dx; hitWall = true; }

    if (y >= maxY) { y = maxY; dy = -dy; hitWall = true; } 
    else if (y <= 0) { y = 0; dy = -dy; hitWall = true; }

    if (hitWall) {
        bounceCount++;
        
        // On the 10th move, trigger the final event
        if (bounceCount >= 10) {
            x = maxX; 
            y = maxY;
            eye.style.left = x + 'px'; 
            eye.style.top = y + 'px';
            isFrozen = true;
            
            // Rapid Rainbow Flash on hit
            let flashInterval = setInterval(() => {
                hue = (hue + 45) % 360;
                eye.style.filter = `hue-rotate(${hue}deg) saturate(15) brightness(1.2) drop-shadow(0 0 40px hsl(${hue}, 100%, 50%))`;
            }, 50);

            // Make it Blink Shut after 600ms
            setTimeout(() => {
                clearInterval(flashInterval);
                eye.innerText = "── ──"; 
                eye.style.fontSize = "80px"; 
                eye.style.fontWeight = "bold";
                eye.style.filter = "hue-rotate(300deg) saturate(10) drop-shadow(0 0 35px #ff00ff)";
            }, 600);

            return;
        }
    }
    
    eye.style.left = x + 'px'; 
    eye.style.top = y + 'px';
    requestAnimationFrame(move);
  }
  
  setTimeout(move, 500);
</script>
</body>
</html>
