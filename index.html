<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weirdcore Eye Screensaver</title>
    <style>
        body { 
            background: black; 
            margin: 0; 
            overflow: hidden; 
            font-family: monospace;
            color: #ff0000;
        }
        #eye { 
            position: absolute; 
            font-size: 150px; 
            user-select: none; 
            line-height: 1;
        }
        /* Weirdcore text elements */
        #warning-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 18px;
            opacity: 0.7;
            letter-spacing: 2px;
        }
        #glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="glitch-overlay"></div>
<div id="warning-text">IT IS LOOKING FOR THE CORNER...</div>
<div id="eye">👁️</div>

<script>
  const eye = document.getElementById('eye');
  
  // Starting positions
  let x = Math.random() * (window.innerWidth - 150); 
  let y = Math.random() * (window.innerHeight - 150);
  
  // Movement speed (4 pixels per frame)
  let dx = 4; 
  let dy = 4;

  function move() {
    x += dx; 
    y += dy;
    
    // Bounce off left and right screen borders
    if (x + eye.offsetWidth >= window.innerWidth || x <= 0) {
        dx = -dx;
    }
    // Bounce off top and bottom screen borders
    if (y + eye.offsetHeight >= window.innerHeight || y <= 0) {
        dy = -dy;
    }
    
    // Move the eye element to the new position
    eye.style.left = x + 'px'; 
    eye.style.top = y + 'px';
    
    // Keep running the loop smoothly
    requestAnimationFrame(move);
  }
  
  move();
</script>
</body>
</html>
